<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Разработчик – Glamour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            
            /* Нежный градиентный фон */
            background: linear-gradient(135deg, #fef5f0 0%, #fde8ed 50%, #f5e0e8 100%);
        }
        
        /* Декоративные полупрозрачные цветы */
        body::before {
            content: "🌸";
            font-size: 180px;
            position: absolute;
            bottom: 10px;
            left: 10px;
            opacity: 0.12;
            pointer-events: none;
            transform: rotate(-15deg);
        }
        
        body::after {
            content: "🌷";
            font-size: 150px;
            position: absolute;
            top: 20px;
            right: 20px;
            opacity: 0.1;
            pointer-events: none;
            transform: rotate(10deg);
        }
        
        /* Дополнительные цветочные акценты */
        .flower-bg-1 {
            position: fixed;
            bottom: 5%;
            right: 3%;
            font-size: 100px;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        
        .flower-bg-2 {
            position: fixed;
            top: 15%;
            left: 2%;
            font-size: 80px;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            transform: rotate(20deg);
        }
        
        .flower-bg-3 {
            position: fixed;
            bottom: 30%;
            left: 15%;
            font-size: 60px;
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }

        .dev-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            max-width: 750px;
            width: 100%;
            padding: 50px 45px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            z-index: 2;
        }

        .dev-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.96);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
            color: #d48a9e;
            font-weight: normal;
        }

        .header-section p {
            color: #b38996;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .developer-photo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #f0c4cf;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .developer-photo:hover {
            transform: scale(1.02);
        }

        .info-table {
            width: 100%;
            margin-top: 15px;
        }

        .info-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #f3dfe4;
            vertical-align: top;
            color: #4a3b40;
        }

        .info-table td:first-child {
            font-weight: bold;
            color: #c2778b;
            width: 38%;
            font-size: 1rem;
        }

        .info-table td:last-child {
            color: #544a4e;
        }

        .back-link {
            margin-top: 35px;
            text-align: center;
        }

        .back-btn {
            color: #b87c8d;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
            padding: 8px 16px;
            display: inline-block;
        }

        .back-btn:hover {
            color: #d48a9e;
        }

        /* Адаптивность */
        @media (max-width: 550px) {
            .dev-card {
                padding: 30px 20px;
            }
            
            .header-section h1 {
                font-size: 1.5rem;
            }
            
            .info-table td {
                display: block;
                width: 100%;
                padding: 10px 8px;
            }
            
            .info-table td:first-child {
                border-bottom: none;
                padding-bottom: 2px;
            }
            
            body::before,
            body::after,
            .flower-bg-1,
            .flower-bg-2,
            .flower-bg-3 {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Декоративные цветы -->
    <div class="flower-bg-1">🌹</div>
    <div class="flower-bg-2">🌺</div>
    <div class="flower-bg-3">💐</div>

    <div class="dev-card">
        <div class="header-section">
            <h1>Информация о разработчике</h1>
            <p>Веб-сайт о макияже «Glamour»</p>
        </div>
        
        <img src="https://https://github.com/soniazagnet-afk/Glamour/blob/main/developer.jpg" alt="Фото разработчика" class="developer-photo">
        
        <table class="info-table">
            <tr><td>Специальность</td><td>5-04-0612-02 «Разработка и сопровождение программного обеспечения информационных систем»</td></tr>
            <tr><td>Код разработчика</td><td>1</td></tr>
            <tr><td>ФИО</td><td>Акопова Софья Грантовна</td></tr>
            <tr><td>Тема сайта</td><td>Веб-сайт о макияже</td></tr>
            <tr><td>Дата создания</td><td>04.05.2026</td></tr>
        </table>
        
        <div class="back-link">
            <a href="make.html" class="back-btn">← Вернуться на главную</a>
        </div>
    </div>
<script>
    function toggleTheme() {
        if (document.body.classList.contains('dark-theme')) {
            document.body.classList.remove('dark-theme');
            localStorage.setItem('theme', 'light');
            const btn = document.querySelector('.theme-toggle i');
            if (btn) btn.className = 'fas fa-moon';
        } else {
            document.body.classList.add('dark-theme');
            localStorage.setItem('theme', 'dark');
            const btn = document.querySelector('.theme-toggle i');
            if (btn) btn.className = 'fas fa-sun';
        }
    }

    function loadTheme() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            const btn = document.querySelector('.theme-toggle i');
            if (btn) btn.className = 'fas fa-sun';
        }
    }

    function searchSite() {
        const query = document.getElementById('searchInput')?.value.trim();
        if (!query) { alert("🔍 Введите запрос"); return; }
        alert(`🔍 Поиск: "${query}"`);
    }

    function initSearch() {
        const input = document.getElementById('searchInput');
        if (input) input.addEventListener('keypress', e => { if (e.key === 'Enter') searchSite(); });
    }

    initSearch();
    loadTheme();
</script>
</body>
</html>
